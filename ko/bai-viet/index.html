<script>
const cards=[...document.querySelectorAll('.art')];
let cat='all';
const norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
function apply(){
  const q=norm(document.getElementById('q').value.trim());
  let shown=0;
  cards.forEach(c=>{
    const okCat=(cat==='all'||c.dataset.cat===cat);
    const okQ=(!q||norm(c.textContent).includes(q));
    c.style.display=(okCat&&okQ)?'':'none';
    if(okCat&&okQ)shown++;
  });
  document.getElementById('empty').style.display=shown?'none':'block';
}
document.getElementById('q').addEventListener('input',apply);
document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');cat=b.dataset.cat;apply();
});
</script>

<script>
(function(){
  var KO=true;
  var REG=(window.SKREG||[]).filter(function(r){return r.p.indexOf('bai-viet/')===0&&r.vc;});
  REG.sort(function(a,b){return (b.d||'').localeCompare(a.d||'');});
  var box=document.getElementById('regList');
  var curCat='all', curQ='';
  function norm(x){return (x||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d');}
  function render(){
    var q=norm(curQ);
    var alt=false;
    box.innerHTML=REG.filter(function(r){
      if(curCat!=='all'&&r.cat!==curCat)return false;
      if(q&&norm(r.vc).indexOf(q)<0&&norm(r.kc).indexOf(q)<0)return false;
      return true;
    }).map(function(r){
      alt=!alt;
      var tag=KO?(r.ktag||''):(r.vtag||'');
      var title=KO?r.kc:r.vc;
      var vd=KO?('✔ 검증일 '+r.d):('✔ Kiểm chứng '+r.d.split('-').reverse().join('/'));
      var href=r.p.replace('bai-viet/','');
      return '<a class="article-card'+(alt?'':' alt')+' art" data-cat="'+r.cat+'" href="'+href+'">'+
        '<span class="tag">'+tag+'</span><h4>'+title+'</h4><div class="verify">'+vd+'</div></a>';
    }).join('')||'<div style="background:#fff;border-radius:12px;padding:22px;text-align:center;color:var(--xam)">'+(KO?'결과 없음':'Không có kết quả')+'</div>';
  }
  document.querySelectorAll('.chip').forEach(function(c){
    c.addEventListener('click',function(){
      document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});
      c.classList.add('on'); curCat=c.dataset.cat||'all'; render();
    });
  });
  var si=document.getElementById('q')||document.querySelector('input[type=search]');
  if(si) si.addEventListener('input',function(){curQ=this.value;render();});
  render();
})();
</script>
