<script>
(function(){
  var KO=true;
  var el=document.getElementById('hubList'); if(!el||!window.SKREG) return;
  var cat=el.dataset.cat;
  var items=window.SKREG.filter(function(r){return r.cat===cat&&(r.vc||r.vt);});
  items.sort(function(a,b){return (b.d||'0000').localeCompare(a.d||'0000');});
  var alt=false;
  el.innerHTML=items.map(function(r){
    alt=!alt;
    var title=KO?(r.kc||r.kt):(r.vc||r.vt);
    var tag=KO?(r.ktag||''):(r.vtag||'');
    var vd=r.d?(KO?('✔ 검증일 '+r.d):('✔ Kiểm chứng '+r.d.split('-').reverse().join('/'))):'';
    return '<a class="article-card'+(alt?'':' alt')+'" href="../'+r.p+'">'+
      (tag?'<span class="tag">'+tag+'</span>':'')+'<h4>'+title+' →</h4>'+(vd?'<div class="verify">'+vd+'</div>':'')+'</a>';
  }).join('');
})();
