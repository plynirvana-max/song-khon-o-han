function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function begin(){
  // base = tier1+tier2 shuffled, first BASE; bonus pool = tier3
  const base=shuffle(BANK.filter(q=>q.t<=2)).slice(0,BASE);
  order=base; pool=shuffle(BANK.filter(q=>q.t===3));
  idx=0;correct=0;answered=0;bonusOn=false;catScore={song:[0,0],tien:[0,0],visa:[0,0],quyen:[0,0]};
  render();
}

function render(){
  const q=order[idx];
  const total=order.length;
  const pct=Math.round(idx/total*100);
  stage.innerHTML=`
    <div class="prog"><div class="tr"><div class="fl" style="width:${pct}%"></div></div>
      <div class="lb">${bonusOn?L.bonus.split(' ')[0]:''} ${L.q_of} ${idx+1}/${total}</div></div>
    <div class="qcard">
      <span class="qcat">${CATS[q.c]}</span>${q.t===3?'<span class="qtier">★ HARD</span>':''}
      <h3>${q.q}</h3>
      <div id="opts">${q.o.map((o,j)=>`<label class="opt" data-j="${j}">${o}</label>`).join('')}</div>
      <div class="fb" id="fb"></div>
      <button class="bigbtn" id="nextBtn" style="display:none"></button>
    </div>`;
  document.querySelectorAll('.opt').forEach(el=>el.onclick=()=>pick(+el.dataset.j));
}

function pick(j){
  const q=order[idx];
  document.querySelectorAll('.opt').forEach(el=>{
    el.onclick=null;
    const jj=+el.dataset.j;
    if(jj===q.a)el.classList.add('right');
    else if(jj===j)el.classList.add('wrong');
    else el.classList.add('dim');
  });
  const ok=j===q.a; answered++;
  catScore[q.c][1]++;
  if(ok){correct++;catScore[q.c][0]++;}
  const fb=document.getElementById('fb');
  fb.className='fb '+(ok?'ok':'no');
  fb.innerHTML='<b>'+(ok?'✅ '+L.correct:'💡 '+L.wrong)+'</b>'+q.w;
  fb.style.display='block';
  const nb=document.getElementById('nextBtn');
  const last = idx>=order.length-1;
  // adaptive: after finishing base, if perfect-ish, add a bonus question (up to 4)
  if(last && !bonusOn && correct>=order.length-1 && pool.length){
    // near-perfect on base → unlock bonus round
  }
  nb.style.display='block';
  nb.textContent = last ? (canBonus()? L.bonus : L.result_btn) : L.next;
  nb.onclick=()=>{
    if(last && canBonus()){ startBonus(); }
    else if(last){ showResult(); }
    else { idx++; render(); }
  };
}
function canBonus(){
  // unlock if finished base with high accuracy and bonus questions remain and not too long yet
  return !bonusOn && order.length<=BASE+3 && pool.length>0 && (correct/answered)>=0.8;
}
function startBonus(){
  bonusOn=true;
  const add=pool.splice(0,4); // up to 4 hard questions
  order=order.concat(add);
  idx++; render();
}

function showResult(){
  const tot=answered;
  const pct=Math.round(correct/tot*100);
  let lv=LV[0]; for(const v of LV) if(pct>=v[0]&&pct<=v[1]) lv=v;
  const emoji=lv[2].split(' ')[0];
  const bars=Object.keys(catScore).map(k=>{
    const [c,n]=catScore[k]; if(!n)return '';
    return `<div class="brow"><span>${CATS[k]}</span><span>${c}/${n}</span></div><div class="btr"><div class="bfl" style="width:${n?c/n*100:0}%"></div></div>`;
  }).join('');
  const weak=Object.keys(catScore).filter(k=>catScore[k][1] && catScore[k][0]<catScore[k][1]);
  stage.innerHTML=`
    <div class="result" style="display:block">
      <div id="shot">
        <div class="ring"></div>
        <div class="brand">SỐNG KHÔN Ở HÀN · 한국살이 레벨테스트</div>
        <div class="emoji">${emoji}</div>
        <div class="lv">${lv[2]}</div>
        <div class="sc">${L.score}: ${correct} / ${tot} (${pct}%)</div>
        <div class="msg">${lv[3]}</div>
        <div class="cats">${bars}</div>
        <div class="url">songkhonohan.com</div>
      </div>
      <button class="bigbtn" id="saveBtn">${L.share}</button>
      <button class="bigbtn ghost" id="copyBtn">${L.copy}</button>
      <div class="recwrap">
        <div style="font-weight:800;font-size:14px;color:var(--xanh);margin:14px 0 4px">${L.weak}</div>
        ${weak.length?weak.map(k=>`<a class="article-card" href="${REC[k][0]}"><span class="tag">${CATS[k]}</span><h4>${REC[k][1]} →</h4></a>`).join(''):`<div class="small">${L.perfect}</div>`}
      </div>
      <button class="bigbtn ghost" onclick="location.reload()" style="margin-top:14px">↺ ${L.retry}</button>
    </div>`;
  document.getElementById('saveBtn').onclick=()=>{
    const node=document.getElementById('shot');
    html2canvas(node,{scale:2,backgroundColor:null}).then(cv=>{
      cv.toBlob(b=>{
        const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='song-khon-o-han-level.png';a.click();
        document.getElementById('saveBtn').textContent='✓ '+L.saved;
      });
    });
  };
  document.getElementById('copyBtn').onclick=()=>{
    const t=`나 한국살이 레벨테스트 {lv} 달성! ({n}/{tot}) 🇰🇷 너는 몇 레벨? 👉 songkhonohan.com/ko/level-test.html`.replace('{lv}',lv[2]).replace('{n}',correct).replace('{tot}',tot);
    navigator.clipboard.writeText(t).then(()=>{document.getElementById('copyBtn').textContent='✓ '+L.copied;});
  };
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('startBtn').onclick=begin;
</script>
